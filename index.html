<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0c0e0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GlowGain">
<meta name="description" content="Daily skincare & weight-gain routine tracker with local AI coach">
<link rel="manifest" href="manifest.json">
<title>GlowGain 🌿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════ */
:root {
  --bg:         #0c0e0d;
  --surface:    #131816;
  --card:       #1a2120;
  --card2:      #1e2725;
  --border:     #263230;
  --border2:    #2e3d3a;
  --amber:      #e8a835;
  --amber-dim:  #a07820;
  --amber-glow: rgba(232,168,53,.15);
  --jade:       #52b08a;
  --jade-dim:   #2d7a5e;
  --jade-glow:  rgba(82,176,138,.15);
  --cream:      #e8dcc8;
  --cream-dim:  #7a9490;
  --cream-faint:#3a4a48;
  --danger:     #e06868;
  --purple:     #b478c8;
  --blue:       #6482c8;
  --r:          16px;
  --r-sm:       10px;
  --nav-h:      68px;
  --shadow:     0 4px 24px rgba(0,0,0,.4);
}

/* ═══════════════════════════════════
   RESET & BASE
═══════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100%;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
button { font-family: inherit; cursor: pointer; }
input, textarea { font-family: inherit; }
a { color: inherit; text-decoration: none; }

/* ═══════════════════════════════════
   LAYOUT
═══════════════════════════════════ */
#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
}

/* ═══════════════════════════════════
   HEADER
═══════════════════════════════════ */
.app-header {
  padding: 16px 18px 12px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 50;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--amber);
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.logo em { color: var(--jade); font-style: normal; }
.header-right { text-align: right; }
.header-date  { font-size: 11px; color: var(--cream-dim); }
.header-streak {
  font-size: 12px; color: var(--amber);
  font-weight: 500; margin-top: 1px;
  display: flex; align-items: center; gap: 3px; justify-content: flex-end;
}

/* ═══════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════ */
.app-nav {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%; max-width: 480px;
  height: var(--nav-h);
  background: rgba(19,24,22,.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  z-index: 100;
}
/* FIGMA: Nav — 6 buttons on narrow screen */
.nav-btn {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px;
  background: none; border: none;
  color: var(--cream-dim);
  padding: 8px 2px;
  min-height: 52px;
  transition: color 0.2s;
  position: relative;
}
.nav-btn.active { color: var(--amber); }
.nav-btn.active::before {
  content: '';
  position: absolute; top: 0; left: 22%; right: 22%;
  height: 2px;
  background: var(--amber);
  border-radius: 0 0 3px 3px;
}
.nav-btn .n-icon { font-size: 20px; transition: transform 0.2s; }
.nav-btn.active .n-icon { transform: scale(1.1); }
/* FIGMA: Nav — smaller label for 6 buttons */
.nav-btn .n-label { font-size: 8px; font-weight: 500; letter-spacing: 0.6px; text-transform: uppercase; }

/* ═══════════════════════════════════
   SCREENS
═══════════════════════════════════ */
.screen {
  padding: 12px 14px calc(var(--nav-h) + 16px);
  display: none;
  min-height: 100vh;
}
.screen.active {
  display: block;
  animation: fadeUp 0.22s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: none; }
}

/* ═══════════════════════════════════
   CARDS
═══════════════════════════════════ */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px;
  margin-bottom: 10px;
}
.card-title {
  font-size: 9.5px; font-weight: 600;
  letter-spacing: 1.8px; text-transform: uppercase;
  color: var(--cream-dim);
  margin-bottom: 12px;
}
.section-heading {
  font-family: 'Playfair Display', serif;
  font-size: 21px; font-weight: 700;
  color: var(--cream);
  margin: 4px 0 14px;
  letter-spacing: -0.3px;
}

/* ═══════════════════════════════════
   PROGRESS RING
═══════════════════════════════════ */
.ring-wrap { display: flex; align-items: center; gap: 16px; padding: 4px 0; }
.ring-svg { transform: rotate(-90deg); flex-shrink: 0; filter: drop-shadow(0 0 8px rgba(232,168,53,.3)); }
.ring-track { fill: none; stroke: var(--border); stroke-width: 7; }
.ring-fill {
  fill: none; stroke: var(--amber); stroke-width: 7; stroke-linecap: round;
  transition: stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1);
}
.ring-fill.full { stroke: var(--jade); }
.ring-info { flex: 1; }
.ring-pct {
  font-family: 'Playfair Display', serif;
  font-size: 44px; font-weight: 700;
  color: var(--amber); line-height: 1;
  transition: color 0.5s;
}
.ring-pct.full { color: var(--jade); }
.ring-label { font-size: 12px; color: var(--cream-dim); margin-top: 3px; }
.ring-day   { font-size: 12px; color: var(--cream-dim); margin-top: 6px; font-weight: 300; }
.ring-done  { font-size: 12px; color: var(--jade); margin-top: 4px; font-weight: 500; display: none; }
.ring-done.show { display: block; }

/* ═══════════════════════════════════
   FIGMA: Frame 1 — Today Screen
   Time-block sections with 3px left accent border
═══════════════════════════════════ */
.block-section {
  border-left: 3px solid transparent;
  padding-left: 10px;
  margin: 6px 0 2px;
}
.block-section.block-morning   { border-color: var(--amber); }
.block-section.block-afternoon { border-color: var(--jade); }
.block-section.block-evening   { border-color: var(--purple); }
.block-section.block-night     { border-color: var(--blue); }

.block-header {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; user-select: none;
  padding: 4px 0 2px;
  -webkit-tap-highlight-color: transparent;
}
.block-header:active { opacity: 0.7; }
.block-chevron {
  margin-left: auto;
  font-size: 12px;
  color: var(--cream-dim);
  transition: transform 0.25s;
  display: inline-block;
}
.block-header.collapsed .block-chevron { transform: rotate(-90deg); }
.block-tasks { overflow: hidden; transition: max-height 0.3s ease; }
.block-tasks.collapsed { max-height: 0 !important; }

/* FIGMA: completion banner */
.completion-banner {
  display: none;
  background: rgba(82,176,138,.15);
  border: 1px solid rgba(82,176,138,.4);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 13px; font-weight: 500; color: var(--jade);
  text-align: center;
  margin-bottom: 10px;
  animation: slideDown 0.35s ease;
}
.completion-banner.show { display: block; }
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: none; }
}

/* ═══════════════════════════════════
   TIME BLOCK LABELS (pills)
═══════════════════════════════════ */
.t-label {
  font-size: 9px; font-weight: 600; letter-spacing: 1.6px;
  text-transform: uppercase;
  padding: 3px 10px; border-radius: 20px;
  display: inline-block;
  margin: 2px 0 4px;
}
.t-morning   { background: rgba(232,168,53,.14); color: var(--amber);  }
.t-afternoon { background: rgba(82,176,138,.14);  color: var(--jade);   }
.t-evening   { background: rgba(180,120,200,.14); color: var(--purple); }
.t-night     { background: rgba(100,130,200,.14); color: var(--blue);   }

/* ═══════════════════════════════════
   TASK ITEMS — pill style (Figma Frame 1)
═══════════════════════════════════ */
.task {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none;
  transition: opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.task:last-child { border-bottom: none; padding-bottom: 0; }
.task:active { opacity: 0.6; }

.task-cb {
  width: 26px; height: 26px;
  border-radius: 8px;
  border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 12px;
  transition: all 0.22s cubic-bezier(.4,0,.2,1);
  color: transparent;
}
.task.done .task-cb {
  background: var(--jade);
  border-color: var(--jade);
  color: #fff;
  transform: scale(1.05);
}
.task-icon { font-size: 17px; flex-shrink: 0; }
.task-text {
  flex: 1;
  font-size: 13.5px; line-height: 1.3;
  transition: color 0.2s;
}
.task.done .task-text { color: var(--cream-dim); text-decoration: line-through; }
.task-tag {
  font-size: 9px; padding: 2px 7px;
  border-radius: 10px; letter-spacing: 0.4px;
  text-transform: uppercase; font-weight: 600; flex-shrink: 0;
}
.tag-skin  { background: rgba(232,168,53,.12); color: var(--amber); }
.tag-diet  { background: rgba(82,176,138,.12);  color: var(--jade);  }
.tag-fit   { background: rgba(180,120,200,.12); color: var(--purple); }
.tag-other { background: rgba(122,148,144,.12); color: var(--cream-dim); }

/* ═══════════════════════════════════
   BONUS / EXTRAS
═══════════════════════════════════ */
.extra-card {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 13px;
  border: 1px solid rgba(232,168,53,.2);
  background: rgba(232,168,53,.04);
  border-radius: 12px; margin-bottom: 8px;
  cursor: pointer; transition: all 0.2s;
}
.extra-card:last-child { margin-bottom: 0; }
.extra-card:active { opacity: 0.6; }
.extra-card.done { background: var(--jade-glow); border-color: rgba(82,176,138,.3); }
.extra-icon { font-size: 20px; }
.extra-text { flex: 1; font-size: 13px; line-height: 1.3; }
.extra-check { font-size: 19px; }

/* ═══════════════════════════════════
   CONFETTI
═══════════════════════════════════ */
.confetti-wrap {
  position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden;
}
.confetti-piece {
  position: absolute; width: 10px; height: 10px; border-radius: 2px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* ═══════════════════════════════════
   FIGMA: Frame 2 — Coach Screen
═══════════════════════════════════ */
/* Model chip row (horizontal scroll) */
.model-chips-row {
  display: flex; gap: 8px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: 4px; margin-bottom: 10px;
  scrollbar-width: none;
}
.model-chips-row::-webkit-scrollbar { display: none; }
.model-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: 22px;
  background: var(--card);
  cursor: pointer; white-space: nowrap;
  transition: border-color 0.2s, background 0.2s;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.model-chip.active {
  border-color: var(--amber);
  background: rgba(232,168,53,.08);
}
.model-chip-icon { font-size: 16px; }
.model-chip-name { font-size: 12px; font-weight: 500; color: var(--cream); }
.model-chip-size { font-size: 10px; color: var(--cream-dim); }

/* User chat bubble — right aligned, amber tinted */
.msg.user {
  align-self: flex-end;
  background: var(--amber);
  color: #0c0e0d;
  font-weight: 500;
  border-bottom-right-radius: 4px;
}
/* AI chat bubble — left aligned, jade tinted, avatar */
.msg.ai {
  align-self: flex-start;
  background: rgba(82,176,138,.10);
  border: 1px solid rgba(82,176,138,.2);
  border-bottom-left-radius: 4px;
  position: relative;
  padding-left: 36px;
}
.msg.ai::before {
  content: '🌿';
  position: absolute; left: 10px; top: 10px;
  font-size: 14px;
}
/* Thinking state — 3-dot pulse */
.msg.think {
  align-self: flex-start;
  background: var(--card2);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--cream-dim);
  padding-left: 36px;
  position: relative;
}
.msg.think::before { content: '🌿'; position: absolute; left: 10px; top: 10px; font-size: 14px; }
.dots-anim {
  display: inline-flex; align-items: center; gap: 4px; vertical-align: middle;
}
.dots-anim span {
  width: 6px; height: 6px; border-radius: 50%; background: var(--cream-dim);
  animation: dotPulse 1.2s infinite ease-in-out;
  display: inline-block;
}
.dots-anim span:nth-child(2) { animation-delay: 0.2s; }
.dots-anim span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
  40%            { transform: scale(1.2); opacity: 1; }
}

/* OLD model-card styles — kept for backwards-compat but unused in v2 */
.model-card {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 14px;
  border: 1px solid var(--border);
  border-radius: 13px; margin-bottom: 8px;
  cursor: pointer; background: var(--surface);
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.model-card:active { transform: scale(0.98); }
.model-card.rec { border-color: rgba(82,176,138,.45); background: rgba(82,176,138,.06); }
.model-card.resume-card { border-color: rgba(232,168,53,.45); background: rgba(232,168,53,.07); }
.model-icon { font-size: 24px; flex-shrink: 0; }
.model-name { font-size: 14px; font-weight: 500; color: var(--cream); }
.model-meta { font-size: 11.5px; color: var(--cream-dim); margin-top: 2px; line-height: 1.4; }
.badge-pill {
  font-size: 9px; padding: 2px 7px; border-radius: 10px;
  font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase;
  margin-left: 6px; vertical-align: middle;
}
.badge-green { background: rgba(82,176,138,.2);  color: var(--jade); }
.badge-amber { background: rgba(232,168,53,.2);  color: var(--amber); }

/* Download per-file bars */
.dl-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 24px 20px;
  text-align: center; margin-bottom: 10px;
}
.dl-spinner { font-size: 44px; animation: spin 2s linear infinite; display: inline-block; margin-bottom: 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.dl-files { text-align: left; margin-top: 14px; }
.dl-file-row { margin-bottom: 10px; }
.dl-file-name { font-size: 10px; color: var(--cream-dim); margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dl-file-bar-wrap { background: var(--border); border-radius: 20px; height: 5px; overflow: hidden; }
.dl-file-fill { background: var(--jade); height: 100%; border-radius: 20px; transition: width 0.3s ease; }
.dl-file-pct { font-size: 10px; color: var(--jade); float: right; margin-top: -14px; }
.progress-track { background: var(--border); border-radius: 20px; height: 7px; overflow: hidden; margin: 14px 0 6px; }
.progress-fill  { background: var(--jade); height: 100%; border-radius: 20px; transition: width 0.3s ease; }

/* Chat UI */
.ai-status-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 10px;
  background: var(--jade-glow);
  border: 1px solid rgba(82,176,138,.3);
  margin-bottom: 10px; font-size: 12px;
}
.ai-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--jade); flex-shrink: 0; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.quick-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.qbtn {
  font-size: 11.5px; padding: 6px 12px;
  border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); color: var(--cream-dim);
  cursor: pointer; white-space: nowrap;
  transition: color 0.18s, border-color 0.18s, background 0.18s;
}
.qbtn:active { color: var(--amber); border-color: var(--amber-dim); background: var(--amber-glow); }

.chat-box { height: calc(100vh - 318px); min-height: 200px; overflow-y: auto; padding: 2px 0; display: flex; flex-direction: column; gap: 9px; }
.msg { max-width: 88%; padding: 10px 13px; border-radius: 15px; font-size: 13.5px; line-height: 1.55; word-wrap: break-word; }
.msg-time  { font-size: 9px; opacity: 0.6; margin-top: 4px; }
.msg.user .msg-time { text-align: right; }

/* Send button — amber */
.chat-input-row { display: flex; gap: 8px; align-items: flex-end; margin-top: 10px; }
.chat-ta {
  flex: 1;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 13px; padding: 11px 13px;
  color: var(--cream); font-size: 13.5px;
  resize: none; max-height: 110px; outline: none;
  line-height: 1.4; transition: border-color 0.2s;
}
.chat-ta:focus { border-color: var(--amber-dim); }
.chat-ta::placeholder { color: var(--cream-dim); }
.send-btn {
  width: 44px; height: 44px; border-radius: 13px;
  background: var(--amber); border: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; color: #0c0e0d; flex-shrink: 0;
  transition: opacity 0.2s, transform 0.15s;
}
.send-btn:active { transform: scale(0.93); }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

/* ═══════════════════════════════════
   FIGMA: Frame 3 — Weight Screen
   Bottom sheet modal + full card chart
═══════════════════════════════════ */
.weight-input-row { display: flex; gap: 10px; align-items: stretch; }
.wt-inp {
  flex: 1; background: var(--surface);
  border: 1px solid var(--border); border-radius: 13px;
  padding: 14px; color: var(--cream);
  font-size: 24px; font-weight: 300; outline: none;
  text-align: center; transition: border-color 0.2s;
}
.wt-inp:focus { border-color: var(--jade); }
.wt-save {
  padding: 0 20px; background: var(--jade);
  border: none; border-radius: 13px; color: #0c0e0d;
  font-size: 14px; font-weight: 600; transition: opacity 0.2s;
}
.wt-save:active { opacity: 0.75; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
.stat-box  { background: var(--surface); border-radius: var(--r-sm); padding: 12px; }
.stat-val  { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--jade); }
.stat-lbl  { font-size: 10px; color: var(--cream-dim); margin-top: 3px; }
.log-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.log-row:last-child { border-bottom: none; }

/* Bottom sheet scrim + drawer */
.sheet-scrim {
  position: fixed; inset: 0; background: rgba(0,0,0,.65);
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 0.28s;
}
.sheet-scrim.show { opacity: 1; pointer-events: all; }
.bottom-sheet {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 480px;
  background: var(--card2);
  border-radius: 20px 20px 0 0;
  z-index: 201;
  padding: 0 0 env(safe-area-inset-bottom,16px);
  transition: transform 0.32s cubic-bezier(.22,1,.36,1);
  max-height: 92vh; overflow-y: auto;
}
.bottom-sheet.show { transform: translateX(-50%) translateY(0); }
.sheet-handle {
  width: 40px; height: 4px; border-radius: 4px;
  background: var(--border2); margin: 12px auto 0;
}
.sheet-body { padding: 14px 16px 24px; }
.sheet-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; margin-bottom: 16px; }

/* ═══════════════════════════════════
   FIGMA: Frame 4 — Streak & Badges
═══════════════════════════════════ */
.streak-hero { text-align: center; padding: 12px 0 10px; }
.streak-num  {
  font-family: 'Playfair Display', serif;
  font-size: 80px; font-weight: 700;
  color: var(--amber); line-height: 1;
  text-shadow: 0 0 40px rgba(232,168,53,.3);
}
.streak-sub { font-size: 13px; color: var(--cream-dim); margin-top: 6px; }

/* Heatmap — improved contrast + DOW labels */
.heatmap-wrap {}
.heatmap-dow-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 4px; }
.heatmap-dow-lbl { font-size: 8px; text-align: center; color: var(--cream-dim); letter-spacing: 0.4px; text-transform: uppercase; }
.heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
.heat-cell { aspect-ratio: 1; border-radius: 7px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; transition: transform 0.15s; }
.heat-cell:active { transform: scale(0.9); }
.hd { font-size: 8px; letter-spacing: 0.4px; text-transform: uppercase; }
.hp { font-size: 10px; font-weight: 600; }
.h0   { background: var(--border);              color: var(--cream-dim); }
.h25  { background: rgba(82,176,138,.2);         color: var(--jade); }
.h50  { background: rgba(82,176,138,.4);         color: var(--jade); }
.h75  { background: rgba(82,176,138,.65);        color: #0c0e0d; }
.h100 { background: var(--jade);                color: #0c0e0d; }
/* Heatmap legend */
.heat-legend { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 9px; color: var(--cream-dim); }
.heat-swatch { width: 12px; height: 12px; border-radius: 3px; }

/* Badge grid — 3 columns (Figma Frame 4) */
.badge-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.badge-card {
  background: var(--surface); border-radius: 13px;
  padding: 12px 8px; text-align: center;
  border: 1px solid var(--border);
  opacity: 0.3; transition: opacity 0.3s, border-color 0.3s, transform 0.2s;
  position: relative;
}
.badge-card.earned { opacity: 1; border-color: var(--amber-dim); box-shadow: 0 0 12px rgba(232,168,53,.12); }
.badge-card.earned:active { transform: scale(0.96); }
.badge-card.locked::after {
  content: '🔒'; position: absolute; top: 4px; right: 6px; font-size: 10px; opacity: 0.6;
}
.badge-em { font-size: 26px; margin-bottom: 5px; }
.badge-n  { font-size: 10px; font-weight: 600; color: var(--amber); margin-bottom: 2px; }
.badge-d  { font-size: 9px; color: var(--cream-dim); line-height: 1.35; }

/* ═══════════════════════════════════
   FIGMA: Frame 5 — Routine Guide
   Tab bar + accordion cards
═══════════════════════════════════ */
.tab-bar {
  display: flex; border-bottom: 1px solid var(--border);
  margin-bottom: 12px; overflow-x: auto;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 1; min-width: 60px;
  padding: 10px 4px;
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--cream-dim); font-size: 13px; font-family: inherit;
  cursor: pointer; text-align: center; white-space: nowrap;
  margin-bottom: -1px; transition: color 0.18s, border-color 0.18s;
}
.tab-btn.active { color: var(--amber); border-bottom-color: var(--amber); font-weight: 500; }

.accordion-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); margin-bottom: 8px; overflow: hidden;
}
.accordion-head {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 14px; cursor: pointer;
  user-select: none; -webkit-tap-highlight-color: transparent;
}
.accordion-head:active { opacity: 0.7; }
.accordion-ic { font-size: 18px; flex-shrink: 0; }
.accordion-lbl { flex: 1; font-size: 13.5px; }
.accordion-cat {
  font-size: 9px; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; font-weight: 600;
}
.accordion-chev {
  font-size: 12px; color: var(--cream-dim);
  transition: transform 0.25s; flex-shrink: 0;
}
.accordion-card.open .accordion-chev { transform: rotate(180deg); }
.accordion-body {
  border-top: 1px solid var(--border);
  border-left: 3px solid var(--jade);
  padding: 11px 14px;
  font-size: 12.5px; color: var(--cream-dim); line-height: 1.6;
  display: none;
}
.accordion-card.open .accordion-body { display: block; }

/* ═══════════════════════════════════
   FIGMA: Frame 6 — Plans Screen
═══════════════════════════════════ */
.plan-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 13px 14px;
  margin-bottom: 8px; transition: opacity 0.2s;
}
.plan-card.disabled { opacity: 0.52; }
.plan-card-icon { font-size: 22px; flex-shrink: 0; }
.plan-card-info { flex: 1; min-width: 0; }
.plan-card-label { font-size: 13.5px; font-weight: 500; }
.plan-card-sub   { font-size: 10px; color: var(--cream-dim); margin-top: 2px; }
.plan-card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* Toggle switch */
.toggle-switch {
  width: 42px; height: 24px; border-radius: 12px;
  background: var(--border2); cursor: pointer;
  position: relative; transition: background 0.2s;
  flex-shrink: 0;
}
.toggle-switch.on { background: var(--jade); }
.toggle-switch::after {
  content: ''; position: absolute;
  width: 18px; height: 18px; border-radius: 9px;
  background: #fff; top: 3px; left: 3px;
  transition: transform 0.2s;
}
.toggle-switch.on::after { transform: translateX(18px); }

.drag-handle { font-size: 18px; color: var(--border2); cursor: grab; }

.disabled-badge {
  font-size: 9px; padding: 2px 8px; border-radius: 8px;
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--cream-dim); font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.4px;
}

/* FAB */
.fab {
  position: fixed; bottom: calc(var(--nav-h) + 16px); right: 16px;
  width: 56px; height: 56px; border-radius: 28px;
  background: var(--amber); border: none;
  font-size: 26px; color: var(--bg);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 20px rgba(232,168,53,.35);
  z-index: 90; cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s;
}
.fab:active { transform: scale(0.93); box-shadow: 0 3px 10px rgba(232,168,53,.2); }
.fab-hidden { display: none; }

/* ═══════════════════════════════════
   FIGMA: Frame 7 — Plan Item Editor
   (inside bottom sheet)
═══════════════════════════════════ */
.field-label { font-size: 11px; font-weight: 500; color: var(--cream-dim); margin-bottom: 6px; margin-top: 14px; letter-spacing: 0.4px; text-transform: uppercase; }
.field-input {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border); border-radius: 13px;
  padding: 12px 14px; color: var(--cream);
  font-size: 14px; font-family: inherit; outline: none;
  transition: border-color 0.2s;
}
.field-input:focus { border-color: var(--amber-dim); }
.field-input::placeholder { color: var(--cream-dim); }
textarea.field-input { resize: none; min-height: 76px; line-height: 1.5; }

/* Segmented control */
.seg-ctrl { display: flex; border: 1px solid var(--border); border-radius: 11px; overflow: hidden; }
.seg-btn {
  flex: 1; padding: 9px 4px; background: var(--surface);
  border: none; border-right: 1px solid var(--border);
  color: var(--cream-dim); font-size: 12px; font-family: inherit;
  cursor: pointer; text-align: center;
  transition: background 0.15s, color 0.15s;
}
.seg-btn:last-child { border-right: none; }
.seg-btn.active { background: rgba(232,168,53,.12); color: var(--amber); font-weight: 500; }

/* Day pills row */
.days-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
.day-pill {
  width: 36px; height: 36px; border-radius: 18px;
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--cream-dim); font-size: 12px; font-weight: 500;
  cursor: pointer; text-align: center; line-height: 33px;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  flex-shrink: 0;
}
.day-pill.on { background: rgba(232,168,53,.18); border-color: var(--amber); color: var(--amber); }

/* Plan editor action bar */
.sheet-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
.btn-primary {
  width: 100%; padding: 14px;
  background: var(--amber); border: none; border-radius: 13px;
  color: var(--bg); font-size: 15px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: opacity 0.18s;
}
.btn-primary:active { opacity: 0.8; }
.btn-danger {
  width: 100%; padding: 12px;
  background: rgba(224,104,104,.08); border: 1.5px solid rgba(224,104,104,.35);
  border-radius: 13px; color: var(--danger);
  font-size: 14px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: opacity 0.18s;
}
.btn-danger:active { opacity: 0.7; }

/* ═══════════════════════════════════
   FIGMA: Frame 8 — Empty State
═══════════════════════════════════ */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 48px 24px;
  text-align: center;
}
.empty-svg { margin-bottom: 20px; }
.empty-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700; color: var(--cream);
  margin-bottom: 8px;
}
.empty-sub { font-size: 14px; color: var(--cream-dim); line-height: 1.6; margin-bottom: 20px; }
.btn-add-step {
  padding: 11px 28px; background: var(--amber);
  border: none; border-radius: 22px; color: var(--bg);
  font-size: 14px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: opacity 0.18s;
}
.btn-add-step:active { opacity: 0.8; }

/* ═══════════════════════════════════
   ROUTINE GUIDE (legacy styles kept)
═══════════════════════════════════ */
.rt-section { font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--cream-dim); margin: 12px 0 6px; }
.rt-row { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(38,50,48,.6); font-size: 13px; line-height: 1.4; }
.rt-row:last-child { border-bottom: none; padding-bottom: 0; }
.rt-ic { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.code-block { background: var(--surface); border-radius: var(--r-sm); padding: 13px; font-family: 'Courier New', monospace; font-size: 11.5px; color: var(--jade); line-height: 1.75; white-space: pre-wrap; word-break: break-all; margin-top: 10px; }

/* ═══════════════════════════════════
   UTILITY
═══════════════════════════════════ */
.note-ok   { padding: 10px 13px; background: var(--jade-glow);  border: 1px solid rgba(82,176,138,.25);  border-radius: 10px; font-size: 12px; color: var(--jade);   line-height: 1.55; margin-top: 10px; }
.note-warn { padding: 10px 13px; background: rgba(224,104,104,.08); border: 1px solid rgba(224,104,104,.25); border-radius: 10px; font-size: 12px; color: var(--danger); line-height: 1.55; margin-top: 10px; }
.note-info { padding: 10px 13px; background: var(--amber-glow); border: 1px solid rgba(232,168,53,.2);   border-radius: 10px; font-size: 12px; color: var(--amber); line-height: 1.55; margin-top: 10px; }

.toast {
  position: fixed;
  bottom: calc(var(--nav-h) + 12px);
  left: 50%; transform: translateX(-50%) translateY(16px);
  padding: 9px 20px; border-radius: 22px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transition: all 0.24s;
  z-index: 300; white-space: nowrap; pointer-events: none;
  box-shadow: var(--shadow);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

<div id="app">
  <header class="app-header">
    <div class="logo">Glow<em>Gain</em> <span style="font-size:17px">🌿</span></div>

</div>

<div class="toast" id="toast"></div>
<div class="confetti-wrap" id="confetti"></div>

<!-- FIGMA: Frame 7 — Plan Item Editor (bottom sheet) -->
<div class="sheet-scrim" id="plan-scrim" onclick="closePlanEditor()"></div>
<div class="bottom-sheet" id="plan-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-body">
    <div class="sheet-title" id="plan-sheet-title">Add Step</div>
    <input type="hidden" id="pe-id">
    <input type="hidden" id="pe-type">

      <button class="seg-btn active" data-val="skin" onclick="segSelect('pe-cat-ctrl',this)">Skin</button>

      <button class="seg-btn active" data-val="morning"   onclick="segSelect('pe-block-ctrl',this)">Morning</button>
      <button class="seg-btn" data-val="afternoon" onclick="segSelect('pe-block-ctrl',this)">Afternoon</button>

    <div class="field-label">Days <span style="font-size:10px;color:var(--cream-faint);font-weight:400;text-transform:none">(empty = every day)</span></div>
    <div class="days-row" id="pe-days-row">
      <button class="day-pill" data-day="0" onclick="toggleDay(this)">S</button>

    <div class="sheet-actions">
      <button class="btn-primary" onclick="savePlanItem()">Save Step</button>
      <button class="btn-danger" id="pe-delete-btn" style="display:none" onclick="deletePlanItemBtn()">Delete Step</button>

  </div>
</div>

<!-- Weight log bottom sheet -->

      <button class="btn-primary" onclick="saveWeightSheet()">Save Weight</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════
   DATA DEFINITIONS
═══════════════════════════════════════════════════ */
const D_LONG  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const D_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

/**
 * PlanItem schema (stored in localStorage as JSON arrays)
 * @typedef {Object} PlanItem
 * @property {string}   id      - Unique ID (Date.now().toString(36) + random suffix)
 * @property {string}   label   - Display name shown in the checklist
 * @property {'skin'|'diet'|'fit'|'other'} cat - Category
 * @property {string}   icon    - Emoji or short string
 * @property {string}   [tip]   - Optional tip shown on expand
 * @property {'morning'|'afternoon'|'evening'|'night'} block - Time block
 * @property {number[]} days    - Weekday indices [0=Sun..6=Sat]. Empty = every day.
 * @property {boolean}  enabled - False = soft-disabled, excluded from checklist
 */

const ROUTINE = {
  morning: [
    { id:'cet_am',  label:'Cetaphil face wash',          cat:'skin', icon:'🧼', tip:'Use lukewarm water, gentle circular motions.' },
    { id:'pond_am', label:"Pond's Gel moisturizer",      cat:'skin', icon:'✨', tip:'Apply while face is still slightly damp.' },
    { id:'uvr',     label:'UVROZ sunscreen (SPF 50)',    cat:'skin', icon:'☀️', tip:'Apply 15 min before stepping out.' },
    { id:'bfast',   label:'2 chapatis + 2 eggs',         cat:'diet', icon:'🍳', tip:'Protein at breakfast reduces hunger all day.' },
  ],
  afternoon: [
    { id:'lunch',   label:'Rice + dal + vegetables',     cat:'diet', icon:'🍱', tip:'Aim for a fist-sized portion of each.' },
    { id:'uvr2',    label:'Reapply sunscreen (outdoors)',cat:'skin', icon:'🌤️', tip:'Every 2 hours outdoors for protection.' },
  ],
  evening: [
    { id:'snack',   label:'Milk + bananas (300+ cal)',   cat:'diet', icon:'🍌', tip:'Full-fat milk + 2–3 bananas = easy calories.' },
    { id:'workout', label:'Workout session',             cat:'fit',  icon:'💪', tip:'Compound lifts: squats, push-ups, rows.', days:[1,3,5] },
  ],
  night: [
    { id:'dinner',  label:'Chapatis + sabzi / dal',      cat:'diet', icon:'🥘', tip:'Eat until satisfied, not stuffed.' },
    { id:'cet_pm',  label:'Cetaphil face wash (PM)',     cat:'skin', icon:'🧼', tip:'Removes all sunscreen and pollution.' },
    { id:'pond_pm', label:"Pond's Gel night moisturizer",cat:'skin', icon:'🌙', tip:'Night moisturizer aids skin repair during sleep.' },
  ],
};

const EXTRAS = [
  { id:'scrub',      label:'Sugar face scrub (gentle)',  days:[3,6], icon:'💆', tip:'Mix sugar + honey, massage 60 s, rinse.' },
  { id:'extra_prot', label:'Chicken / fish meal',        days:[0],   icon:'🍗', tip:'Sunday protein boost helps muscle growth.' },
];

const BLOCK_META = {
  morning:   { label:'Morning',   cls:'t-morning'   },
  afternoon: { label:'Afternoon', cls:'t-afternoon' },
  evening:   { label:'Evening',   cls:'t-evening'   },
  night:     { label:'Night',     cls:'t-night'     },
};

const AI_MODELS = [
  {
    id:   'HuggingFaceTB/SmolLM2-135M-Instruct',
    name: 'SmolLM2 135M', icon: '⚡', size: '~270 MB',
    note: 'Fastest · Best for Redmi 9i · Loads in seconds after first download',
    rec:  true, prompt: 'compact',
  },
  {
    id:   'HuggingFaceTB/SmolLM2-360M-Instruct',
    name: 'SmolLM2 360M', icon: '🏃', size: '~720 MB',
    note: 'Smarter replies · Good balance of speed and quality',
    rec:  false, prompt: 'compact',
  },
  {
    id:   'Xenova/TinyLlama-1.1B-Chat-v1.0',
    name: 'TinyLlama 1.1B', icon: '🐢', size: '~637 MB',
    note: 'Best quality · Slower on phone · Best instruction following',
    rec:  false, prompt: 'full',
  },
];

/* ═══════════════════════════════════════════════════
   GLOBAL STATE
═══════════════════════════════════════════════════ */
const NOW       = new Date();
const TODAY     = NOW.toISOString().split('T')[0];
const DOW       = NOW.getDay();

let ai          = null;
let aiState     = 'idle';
let aiModelId   = null;
let aiPromptType= 'compact';
let aiRunning   = false;
let chatMounted = false;
let chatHistory = [];
let dlProgress  = {};

// Plans screen state
let plansActiveTab = 'skin'; // 'skin' | 'diet'

/* ═══════════════════════════════════════════════════
   STORAGE HELPERS
═══════════════════════════════════════════════════ */
const storage = {
  get:    (k, def={}) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):def; } catch{return def;} },
  set:    (k, v)      => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){console.warn('Storage full',e);} },
  getDay: (date)      => storage.get('gg_d_'+date, {done:[], extras:{}}),
  setDay: (date, v)   => storage.set('gg_d_'+date, v),
  getWt:  ()          => storage.get('gg_wt', {}),
  setWt:  (v)         => storage.set('gg_wt', v),
  model: {
    get:  ()   => localStorage.getItem('gg_model_id'),
    set:  (id) => localStorage.setItem('gg_model_id', id),
  },
  // ─── Track B: Plans storage ───
  plans: {
    getSkin: ()  => storage.get('gg_plan_skin', []),
    getDiet: ()  => storage.get('gg_plan_diet', []),
    setSkin: (v) => storage.set('gg_plan_skin', v),
    setDiet: (v) => storage.set('gg_plan_diet', v),
    getAll:  ()  => [...storage.plans.getSkin(), ...storage.plans.getDiet()],
  },
};

/* ═══════════════════════════════════════════════════
   TRACK B: DEFAULT PLAN SEEDING
═══════════════════════════════════════════════════ */
function seedDefaultPlans() {
  if (localStorage.getItem('gg_plan_seeded')) return;

  const skinItems = [], dietItems = [];

  for (const [block, tasks] of Object.entries(ROUTINE)) {
    for (const t of tasks) {
      const item = {
        id: t.id, label: t.label, cat: t.cat, icon: t.icon,
        tip: t.tip || '', block, days: t.days || [], enabled: true
      };
      if (t.cat === 'skin') skinItems.push(item);
      else dietItems.push(item);
    }
  }

  for (const e of EXTRAS) {
    dietItems.push({
      id: e.id, label: e.label, cat: 'other', icon: e.icon,
      tip: e.tip || '', block: 'evening', days: e.days, enabled: true
    });
  }

  storage.set('gg_plan_skin', skinItems);
  storage.set('gg_plan_diet', dietItems);
  localStorage.setItem('gg_plan_seeded', '1');
}

/* ═══════════════════════════════════════════════════
   TRACK B: allTasksForDay — reads live plan data
═══════════════════════════════════════════════════ */
function allTasksForDay(dow = DOW) {
  const all = storage.plans.getAll();
  return all.filter(item => {
    if (!item.enabled) return false;
    if (item.days && item.days.length > 0 && !item.days.includes(dow)) return false;
    return true;
  });
}

function pctForDate(dateKey) {
  const dow  = new Date(dateKey + 'T12:00:00').getDay();
  const all  = allTasksForDay(dow);
  if (!all.length) return 0;
  const { done } = storage.getDay(dateKey);
  return Math.round(done.filter(id => all.some(t => t.id === id)).length / all.length * 100);
}

function toast(msg, type = 'ok') {

  el.textContent = msg;

  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2300);
}

function confetti() {
  const wrap = document.getElementById('confetti');
  wrap.innerHTML = '';
  const colors = ['#e8a835','#52b08a','#b478c8','#6482c8','#e06868','#e8dcc8'];
  for (let i = 0; i < 48; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.2+Math.random()*1.2}s;animation-delay:${Math.random()*.4}s;`;

// Track collapsed blocks
const _collapsedBlocks = new Set();

function renderToday() {
  const dayData = storage.getDay(TODAY);
  const pct     = pctForDate(TODAY);
  const R = 40, C = 2 * Math.PI * R;
  const offset  = C - (pct / 100) * C;
  const full    = pct === 100;

  // Group tasks by block from live plan data
  const tasks = allTasksForDay();
  const byBlock = { morning:[], afternoon:[], evening:[], night:[] };
  for (const t of tasks) {
    if (byBlock[t.block]) byBlock[t.block].push(t);
  }

  // Also gather extra (cat:'other') tasks for this DOW
  const allPlan = storage.plans.getAll();
  const todayExtras = allPlan.filter(e =>
    e.cat === 'other' && e.enabled &&
    (e.days.length === 0 || e.days.includes(DOW))
  );

  let blockHtml = '';
  for (const [block, meta] of Object.entries(BLOCK_META)) {
    const bTasks = byBlock[block] || [];
    // filter out 'other' items which show in extras
    const filtered = bTasks.filter(t => t.cat !== 'other');
    if (!filtered.length) continue;

    const isCollapsed = _collapsedBlocks.has(block);
    blockHtml += `
      <div class="block-section block-${block}">
        <div class="block-header${isCollapsed ? ' collapsed' : ''}" onclick="toggleBlock('${block}', this)">
          <span class="${meta.cls} t-label" style="margin:0">${meta.label}</span>
          <span class="block-chevron">▾</span>
        </div>
        <div class="block-tasks" style="max-height:${isCollapsed ? 0 : 2000}px">`;
    for (const t of filtered) {
      const done = dayData.done.includes(t.id);
      blockHtml += `
        <div class="task ${done ? 'done' : ''}" onclick="toggleTask('${t.id}')">
          <div class="task-cb">${done ? '✓' : ''}</div>
          <span class="task-icon">${t.icon}</span>
          <div style="flex:1">
            <div class="task-text">${t.label}</div>
            ${done ? '' : `<div style="font-size:11px;color:var(--cream-dim);margin-top:1px">${t.tip||''}</div>`}
          </div>
          <span class="task-tag tag-${t.cat === 'skin' ? 'skin' : t.cat === 'diet' ? 'diet' : t.cat === 'fit' ? 'fit' : 'other'}">${t.cat}</span>
        </div>`;
    }
    blockHtml += `</div></div>`;
  }

  // Extras (cat:'other') from plan
  let extraHtml = '';
  if (todayExtras.length) {
    extraHtml = `<div class="card"><p class="card-title">Today's Extras ✨</p>`;
    for (const e of todayExtras) {
      const done = dayData.done.includes(e.id);
      extraHtml += `
        <div class="extra-card ${done ? 'done' : ''}" onclick="toggleTask('${e.id}')">
          <span class="extra-icon">${e.icon}</span>
          <div style="flex:1">
            <div class="extra-text">${e.label}</div>
            <div style="font-size:11px;color:var(--cream-dim);margin-top:1px">${e.tip||''}</div>
          </div>
          <span class="extra-check">${done ? '✅' : '⬜'}</span>
        </div>`;
    }
    extraHtml += '</div>';
  }

  document.getElementById('s-today').innerHTML = `
    <div class="${full ? 'completion-banner show' : 'completion-banner'}">✨ All Done! Great work today.</div>
    <div class="card" style="margin-top:4px">
      <div class="ring-wrap">
        <svg width="96" height="96" class="ring-svg" viewBox="0 0 96 96">
          <circle class="ring-track" cx="48" cy="48" r="${R}"/>
          <circle class="ring-fill ${full ? 'full' : ''}" cx="48" cy="48" r="${R}"
            stroke-dasharray="${C.toFixed(2)}"
            stroke-dashoffset="${offset.toFixed(2)}"/>
        </svg>
        <div class="ring-info">
          <div class="ring-pct ${full ? 'full' : ''}">${pct}%</div>
          <div class="ring-label">of today's routine done</div>
          <div class="ring-day">${D_LONG[DOW]}</div>
          <div class="ring-done ${full ? 'show' : ''}">🎉 Perfect day! Amazing work.</div>
        </div>
      </div>
    </div>
    <div class="card">
      <p class="card-title">Routine Checklist</p>
      ${blockHtml}
    </div>
    ${extraHtml}`;
}

function toggleBlock(block, headerEl) {
  if (_collapsedBlocks.has(block)) {
    _collapsedBlocks.delete(block);
    headerEl.classList.remove('collapsed');
    headerEl.nextElementSibling.style.maxHeight = '2000px';
  } else {
    _collapsedBlocks.add(block);
    headerEl.classList.add('collapsed');
    headerEl.nextElementSibling.style.maxHeight = '0';
  }
}

function toggleTask(id) {
  const d = storage.getDay(TODAY);
  const i = d.done.indexOf(id);
  const wasComplete = pctForDate(TODAY) === 100;
  if (i === -1) d.done.push(id);
  else          d.done.splice(i, 1);
  storage.setDay(TODAY, d);
  const nowComplete = pctForDate(TODAY) === 100;
  if (nowComplete && !wasComplete) { toast('🎉 100% complete! Amazing!', 'ok'); confetti(); }
  else if (i === -1)                { toast('✓ Done!'); }
  renderToday();
  updateHeader();
}

/* ═══════════════════════════════════════════════════
   SCREEN 2 — AI COACH
═══════════════════════════════════════════════════ */
function getStats() {
  const d       = storage.getDay(TODAY);
  const all     = allTasksForDay();
  const done    = all.filter(t => d.done.includes(t.id));
  const pending = all.filter(t => !d.done.includes(t.id));
  const pct     = pctForDate(TODAY);
  const wt      = storage.getWt()[TODAY];
  let streak = 0;
  for (let i = 0; i < 7; i++) {
    const dt = new Date(NOW); dt.setDate(dt.getDate() - i);
    if (pctForDate(dt.toISOString().split('T')[0]) >= 80) streak++;
    else break;
  }
  return { d, all, done, pending, pct, wt, streak };
}

/* ── Model Loading ─────────────────────────────── */
async function loadModel(modelId) {
  const modelDef  = AI_MODELS.find(m => m.id === modelId);
  aiState         = 'loading';
  aiModelId       = modelId;
  aiPromptType    = modelDef?.prompt || 'compact';
  dlProgress      = {};
  storage.model.set(modelId);
  chatMounted     = false;
  chatHistory     = [];
  renderCoach();

  try {
    const { pipeline, env } = await import(
      'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.2/dist/transformers.min.js'
    );
    env.allowLocalModels = false;
    env.useBrowserCache  = true;

    ai = await pipeline('text-generation', modelId, {
      dtype: 'q4',
      progress_callback: info => {
        if (info.status === 'download' || info.status === 'downloading') {
          dlProgress[info.file || info.name || 'model'] = info.progress || 0;
          refreshDlProgress();
        }
      },
    });

    aiState = 'ready';
    renderCoach();
  } catch (err) {
    console.error('[GlowGain AI Load]', err);
    aiState = 'error';
    renderCoach();
  }
}

function refreshDlProgress() {
  const container = document.getElementById('dl-files-container');
  if (!container) return;
  container.innerHTML = '';
  for (const [file, pct] of Object.entries(dlProgress)) {
    const name = file.split('/').pop();
    const row = document.createElement('div');
    row.className = 'dl-file-row';
    row.innerHTML = `
      <div class="dl-file-name">${name}</div>
      <div class="dl-file-bar-wrap"><div class="dl-file-fill" style="width:${pct.toFixed(1)}%"></div></div>
      <div class="dl-file-pct">${pct.toFixed(0)}%</div>`;
    container.appendChild(row);
  }
  // Also update the legacy single bar if present
  const bar  = document.getElementById('dl-bar');
  const pctL = document.getElementById('dl-pct');
  if (bar) {
    const vals = Object.values(dlProgress);
    const avg  = vals.length ? vals.reduce((a,b) => a+b, 0) / vals.length : 0;
    bar.style.width = avg.toFixed(1) + '%';
    if (pctL) pctL.textContent = avg.toFixed(0) + '%';
  }
}

      <div class="msg-time">${m.time || ''}</div>
    </div>`
  ).join('');
  box.scrollTop = box.scrollHeight;
}

async function qsend(msg) { await sendMsg(msg); }

async function sendChat() {
  const inp = document.getElementById('chat-in');
  const msg = inp?.value?.trim();
  if (!msg) return;
  inp.value = '';
  inp.style.height = 'auto';
  await sendMsg(msg);
}

async function sendMsg(msg) {
  if (aiRunning || !ai) return;
  aiRunning = true;
  const btn = document.getElementById('send-btn');
  if (btn) btn.disabled = true;

  chatHistory.push({ role: 'user', content: msg, time: fmtTime() });
  renderMsgs();

  const box = document.getElementById('chat-box');
  const thinking = document.createElement('div');
  thinking.className = 'msg think';
  // FIGMA: 3-dot pulse animation
  thinking.innerHTML = `Thinking <span class="dots-anim"><span></span><span></span><span></span></span>`;
  box?.appendChild(thinking);
  box?.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });

  try {
    const sysPrompt = buildSystemPrompt(aiPromptType);
    const messages = [
      { role: 'system',    content: sysPrompt },
      ...chatHistory.slice(-8),
    ];
    const output = await ai(messages, {
      max_new_tokens:   180,
      temperature:      0.72,
      repetition_penalty: 1.15,
      do_sample:        true,
      return_full_text: false,
    });

    let reply = '';
    const gen = output[0]?.generated_text;
    if (Array.isArray(gen)) {
      const last = gen.at(-1);
      reply = typeof last === 'string' ? last : (last?.content || '');
    } else {
      reply = typeof gen === 'string' ? gen : '';
    }

    reply = reply
      .replace(/<\|[^|]+\|>/g, '')
      .replace(/^(assistant|ASSISTANT|GlowGain AI|Coach):\s*/i, '')
      .replace(/\[INST\].*?\[\/INST\]/gs, '')
      .trim();

    if (!reply || reply.length < 3) reply = "I'm still warming up — could you rephrase that?";
    chatHistory.push({ role: 'assistant', content: reply, time: fmtTime() });
  } catch (err) {
    console.error('[AI generate]', err);
    chatHistory.push({ role: 'assistant', content: "Something went wrong generating a reply. Try again!", time: fmtTime() });
  }

  thinking.remove();
  aiRunning = false;
  if (btn) btn.disabled = false;
  renderMsgs();
}

   SCREEN 3 — WEIGHT (with bottom sheet modal)

function renderWeight() {
  const log     = storage.getWt();
  const entries = Object.entries(log).sort(([a], [b]) => a.localeCompare(b));
  const last7   = entries.slice(-7);
  const weights = last7.map(([, v]) => parseFloat(v)).filter(Boolean);
  const todayWt = log[TODAY] || '';
  const latest  = weights[weights.length - 1];
  const weekChg = weights.length >= 2 ? (latest - weights[0]).toFixed(1) : null;

  // FIGMA: Full-width SVG chart with grid lines + hover dots
  let chartHtml = `
    <div style="text-align:center;padding:24px 0;color:var(--cream-dim)">
      <div style="font-size:34px;margin-bottom:8px">📈</div>
      <div style="font-size:13px">Log 2+ days to see your progress trend</div>
    </div>`;
  if (weights.length >= 2) {
    const W2 = 300, H2 = 96;
    const mn = Math.min(...weights) - 0.5, mx = Math.max(...weights) + 0.5;
    const xs = W2 / (weights.length - 1);
    const Y  = w => H2 - ((w - mn) / (mx - mn)) * H2;
    const pts = weights.map((w, i) => `${(i * xs).toFixed(1)},${Y(w).toFixed(1)}`).join(' ');
    // Y-axis labels
    const yLabels = [mn+0.5, (mn+mx)/2, mx-0.5].map(v => v.toFixed(1));
    const dots = weights.map((w, i) => {
      const x = (i * xs).toFixed(1), y = Y(w).toFixed(1);
      return `<circle cx="${x}" cy="${y}" r="5" fill="var(--jade)" stroke="var(--card)" stroke-width="2.5"/>
              <text x="${x}" y="${(parseFloat(y) - 10).toFixed(1)}" text-anchor="middle" font-size="9.5" fill="var(--jade)" font-weight="600">${w.toFixed(1)}</text>`;
    }).join('');
    // Grid lines
    const gridLines = [0.25,0.5,0.75].map(f =>
      `<line x1="-30" y1="${(H2*(1-f)).toFixed(1)}" x2="${W2}" y2="${(H2*(1-f)).toFixed(1)}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,4"/>`
    ).join('');
    // X labels
    const xlbls = last7.map(([k], i) => {
      const d = new Date(k + 'T12:00:00');
      return `<text x="${(i * xs).toFixed(1)}" y="${H2 + 17}" text-anchor="middle" font-size="9" fill="var(--cream-dim)">${D_SHORT[d.getDay()]}</text>`;
    }).join('');
    // Y labels
    const ylbls = [0,0.5,1].map((f,idx) => {
      const val = (mn + (mx-mn)*f).toFixed(1);
      return `<text x="-32" y="${(H2*(1-f)+4).toFixed(1)}" text-anchor="end" font-size="8.5" fill="var(--cream-dim)">${val}</text>`;
    }).join('');
    chartHtml = `<svg width="100%" viewBox="-36 -20 ${W2+40} ${H2+30}" style="overflow:visible;display:block">
      ${gridLines}
      <polyline points="${pts}" fill="none" stroke="var(--amber)" stroke-width="2.5" stroke-linejoin="round"/>
      ${dots}${xlbls}${ylbls}
    </svg>`;
  }

  const noteHtml = weekChg !== null
    ? (parseFloat(weekChg) < 0.3
        ? `<div class="note-warn">⚠️ Gain below +0.3 kg this week. Add one extra egg, banana or glass of milk per day — small tweaks compound quickly!</div>`
        : `<div class="note-ok">✅ On track! +${weekChg} kg this week — right in the lean bulk sweet spot. Keep going!</div>`)
    : '';

  // Weekly pill badges
  const weekPills = last7.length >= 2 ? (() => {
    const pairs = last7.map(([k,v],i,a) => {
      if (i===0) return null;
      const diff = (parseFloat(v) - parseFloat(a[i-1][1])).toFixed(1);
      const col = parseFloat(diff) >= 0 ? 'var(--jade)' : 'var(--danger)';
      return `<span style="font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid ${col};color:${col};white-space:nowrap">${parseFloat(diff)>=0?'+':''}${diff} kg</span>`;
    }).filter(Boolean);
    return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">${pairs.join('')}</div>`;
  })() : '';

  document.getElementById('s-weight').innerHTML = `
    <h2 class="section-heading">Weight Log</h2>
    <div class="card">
      <p class="card-title">Log today's weight (kg)</p>
      <div class="weight-input-row">
        <input type="number" id="wt-inp" class="wt-inp"
          placeholder="${todayWt || '60.0'}"
          value="${todayWt}" step="0.1" min="20" max="300">
        <button class="wt-save" onclick="openWeightSheet()">Log</button>
      </div>
    </div>
    <div class="card">
      <p class="card-title">7-Day Trend</p>
      ${chartHtml}
      ${weekPills}
      ${weights.length >= 2 ? `
        <div class="stat-grid">
          <div class="stat-box">
            <div class="stat-val">${latest ? latest.toFixed(1) + ' kg' : '—'}</div>
            <div class="stat-lbl">Current weight</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" style="color:${parseFloat(weekChg) > 0 ? 'var(--jade)' : 'var(--danger)'}">
              ${weekChg !== null ? (parseFloat(weekChg) > 0 ? '+' : '') + weekChg + ' kg' : '—'}
            </div>
            <div class="stat-lbl">7-day change</div>
          </div>
        </div>
        ${noteHtml}` : ''}
    </div>
    ${entries.length ? `
    <div class="card">
      <p class="card-title">History</p>
      ${entries.slice().reverse().slice(0, 14).map(([k, v]) => {
        const d = new Date(k + 'T12:00:00');
        return `<div class="log-row">
          <span>📅</span>
          <span style="flex:1;color:var(--cream-dim)">${D_SHORT[d.getDay()]} ${d.getDate()}/${d.getMonth() + 1}</span>
          <span style="font-weight:600;color:var(--jade)">${parseFloat(v).toFixed(1)} kg</span>
        </div>`;
      }).join('')}
    </div>` : ''}`;
}

/* ═══════════════════════════════════════════════════
   SCREEN 4 — STREAK (3-col badges, improved heatmap)
═══════════════════════════════════════════════════ */
function renderStreak() {
  const days = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(NOW); d.setDate(d.getDate() - i);
    const key = d.toISOString().split('T')[0];
    days.push({ key, dow: d.getDay(), pct: pctForDate(key) });
  }

  let streak = 0;
  for (let i = days.length - 1; i >= 0; i--) { if (days[i].pct >= 80) streak++; else break; }

  // Use plan-based IDs for skin and diet streaks
  const skinIds = storage.plans.getSkin().filter(i=>i.enabled&&i.cat==='skin').map(i=>i.id);
  const dietIds = storage.plans.getDiet().filter(i=>i.enabled&&i.cat==='diet').map(i=>i.id);
  const minSkin = Math.ceil(Math.max(1, skinIds.length * 0.7));
  const minDiet = Math.ceil(Math.max(1, dietIds.length * 0.7));

  let skinStreak = 0;
  for (let i = days.length - 1; i >= 0; i--) {
    const { done } = storage.getDay(days[i].key);
    if (skinIds.filter(id => done.includes(id)).length >= minSkin) skinStreak++;
    else break;
  }
  let dietStreak = 0;
  for (let i = days.length - 1; i >= 0; i--) {
    const { done } = storage.getDay(days[i].key);
    if (dietIds.filter(id => done.includes(id)).length >= minDiet) dietStreak++;
    else break;
  }

  let workouts = 0, perfectDays = 0, activeDays = 0;
  for (const d of days) {
    const { done } = storage.getDay(d.key);
    if (done.includes('workout')) workouts++;
    if (d.pct === 100) perfectDays++;
    if (d.pct > 0)    activeDays++;
  }

  // FIGMA: Heatmap with DOW labels above + color legend below
  const last7Days = days.slice(-7);
  const dowLabels = last7Days.map(d =>
    `<div class="heatmap-dow-lbl">${D_SHORT[d.dow].slice(0,1)}</div>`
  ).join('');
  const heatHtml = last7Days.map(d => {
    const cls = d.pct === 0 ? 'h0' : d.pct < 50 ? 'h25' : d.pct < 75 ? 'h50' : d.pct < 100 ? 'h75' : 'h100';
    return `<div class="heat-cell ${cls}">
      <span class="hp">${d.pct > 0 ? d.pct + '%' : '—'}</span>
    </div>`;
  }).join('');
  const legendItems = [
    {cls:'h0',lbl:'0%'},{cls:'h25',lbl:'<50%'},{cls:'h50',lbl:'50%'},{cls:'h75',lbl:'75%'},{cls:'h100',lbl:'100%'}
  ];
  const legendHtml = `<div class="heat-legend">
    ${legendItems.map(l=>`<div class="heat-swatch ${l.cls}"></div><span>${l.lbl}</span>`).join('')}
  </div>`;

  // FIGMA: 3-column badge grid, locked badges have 🔒 overlay
  const badges = [
    { e: '🌟', n: '3-Day Glow',    d: '3-day skincare streak',  earned: skinStreak >= 3  },
    { e: '💪', n: 'Mass Builder',  d: '5 workouts completed',   earned: workouts >= 5    },
    { e: '🔥', n: '7-Day Warrior', d: '7 days at 80%+',         earned: streak >= 7      },
    { e: '✨', n: 'Skincare Pro',  d: '7-day skincare streak',  earned: skinStreak >= 7  },
    { e: '🏆', n: 'Perfect Day',   d: '100% day completion',    earned: perfectDays >= 1 },
    { e: '🌱', n: 'Growing Strong',d: '7+ active days tracked', earned: activeDays >= 7  },
    { e: '🎯', n: 'Consistent',    d: '14 active days tracked', earned: activeDays >= 14 },
    { e: '👑', n: 'Elite Glow',    d: '14-day streak at 80%+',  earned: streak >= 14     },
    { e: '🍽️',n: 'Nutrition Hero', d: '7-day diet streak',      earned: dietStreak >= 7  },
  ];

  document.getElementById('s-streak').innerHTML = `
    <h2 class="section-heading">Streak & Progress</h2>
    <div class="card">
      <div class="streak-hero">
        <div class="streak-num">${streak}</div>
        <div class="streak-sub">day streak at 80%+ completion 🔥</div>
      </div>
      <div class="stat-grid">
        <div class="stat-box" style="text-align:center">
          <div class="stat-val" style="font-size:30px">${skinStreak}</div>
          <div class="stat-lbl">✨ Skincare streak</div>
        </div>
        <div class="stat-box" style="text-align:center">
          <div class="stat-val" style="font-size:30px">${dietStreak}</div>
          <div class="stat-lbl">🥗 Diet streak</div>
        </div>
      </div>
    </div>
    <div class="card">
      <p class="card-title">This Week</p>
      <div class="heatmap-wrap">
        <div class="heatmap-dow-row">${dowLabels}</div>
        <div class="heatmap">${heatHtml}</div>
        ${legendHtml}
      </div>
      <div class="stat-grid">
        <div class="stat-box" style="text-align:center">
          <div class="stat-val" style="font-size:28px">${workouts}</div>
          <div class="stat-lbl">💪 Workouts done</div>
        </div>
        <div class="stat-box" style="text-align:center">
          <div class="stat-val" style="font-size:28px">${perfectDays}</div>
          <div class="stat-lbl">🏆 Perfect days</div>
        </div>
      </div>
    </div>
    <div class="card">
      <p class="card-title">Badges</p>
      <div class="badge-grid">
        ${badges.map(b => `
          <div class="badge-card ${b.earned ? 'earned' : 'locked'}">
            <div class="badge-em">${b.e}</div>
            <div class="badge-n">${b.n}</div>
            <div class="badge-d">${b.d}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

  else                 storage.plans.setDiet(arr);
  toast(item.enabled ? '✓ Step enabled' : 'Step disabled', item.enabled ? 'ok' : 'warn');
  renderPlans();
  renderToday();
}

/* ═══════════════════════════════════════════════════
   PLAN EDITOR FUNCTIONS (Track B)
═══════════════════════════════════════════════════ */
function openPlanEditor(planType, itemId) {
  document.getElementById('pe-type').value = planType;
  document.getElementById('pe-id').value   = itemId || '';
  document.getElementById('plan-sheet-title').textContent = itemId ? 'Edit Step' : 'Add Step';
  document.getElementById('pe-delete-btn').style.display = itemId ? 'block' : 'none';

  // Reset fields
  document.getElementById('pe-label').value = '';
  document.getElementById('pe-icon').value  = '';
  document.getElementById('pe-tip').value   = '';
  document.getElementById('pe-enabled-toggle').className = 'toggle-switch on';
  segSelectByVal('pe-cat-ctrl', 'skin');
  segSelectByVal('pe-block-ctrl', 'morning');
  document.querySelectorAll('#pe-days-row .day-pill').forEach(p => p.classList.remove('on'));

  if (itemId) {
    const arr = planType === 'skin' ? storage.plans.getSkin() : storage.plans.getDiet();
    const item = arr.find(i => i.id === itemId);
    if (item) {
      document.getElementById('pe-label').value = item.label;
      document.getElementById('pe-icon').value  = item.icon;
      document.getElementById('pe-tip').value   = item.tip || '';
      if (!item.enabled) document.getElementById('pe-enabled-toggle').classList.remove('on');
      segSelectByVal('pe-cat-ctrl',   item.cat);
      segSelectByVal('pe-block-ctrl', item.block);
      document.querySelectorAll('#pe-days-row .day-pill').forEach(p => {
        if (item.days.includes(parseInt(p.dataset.day))) p.classList.add('on');
      });
    }
  }

  document.getElementById('plan-scrim').classList.add('show');
  document.getElementById('plan-sheet').classList.add('show');
  setTimeout(() => document.getElementById('pe-label').focus(), 320);
}

function closePlanEditor() {
  document.getElementById('plan-scrim').classList.remove('show');
  document.getElementById('plan-sheet').classList.remove('show');
}

function savePlanItem() {
  const planType = document.getElementById('pe-type').value;
  const id       = document.getElementById('pe-id').value;
  const label    = document.getElementById('pe-label').value.trim();
  const icon     = document.getElementById('pe-icon').value.trim() || '📌';
  const tip      = document.getElementById('pe-tip').value.trim();
  const enabled  = document.getElementById('pe-enabled-toggle').classList.contains('on');

  // Get segmented values
  const catBtn   = document.querySelector('#pe-cat-ctrl .seg-btn.active');
  const blockBtn = document.querySelector('#pe-block-ctrl .seg-btn.active');
  const cat      = catBtn?.dataset.val || 'skin';
  const block    = blockBtn?.dataset.val || 'morning';

  // Days
  const days = [];
  document.querySelectorAll('#pe-days-row .day-pill.on').forEach(p => days.push(parseInt(p.dataset.day)));

  if (!label) { toast('Label is required', 'err'); return; }
  if (!block) { toast('Select a time block', 'err'); return; }

  const arr = planType === 'skin' ? storage.plans.getSkin() : storage.plans.getDiet();

  if (id) {
    const idx = arr.findIndex(i => i.id === id);
    if (idx > -1) arr[idx] = { id, label, cat, icon, tip, block, days, enabled };
  } else {
    const newId = Date.now().toString(36) + Math.random().toString(36).slice(2);
    arr.push({ id: newId, label, cat, icon, tip, block, days, enabled });
  }

  if (planType === 'skin') storage.plans.setSkin(arr);
  else                     storage.plans.setDiet(arr);

  closePlanEditor();
  toast('Step saved ✓');
  renderPlans();
  renderToday();
}

function deletePlanItemBtn() {
  const planType = document.getElementById('pe-type').value;
  const id       = document.getElementById('pe-id').value;
  if (!id) return;
  if (!confirm('Remove this step from your plan?')) return;
  const arr = planType === 'skin' ? storage.plans.getSkin() : storage.plans.getDiet();
  const filtered = arr.filter(i => i.id !== id);
  if (planType === 'skin') storage.plans.setSkin(filtered);
  else                     storage.plans.setDiet(filtered);
  closePlanEditor();
  toast('Step removed', 'warn');
  renderPlans();
  renderToday();
}

/* ═══════════════════════════════════════════════════
   EDITOR HELPERS — segmented control, day pills
═══════════════════════════════════════════════════ */
function segSelect(ctrlId, btn) {
  document.querySelectorAll(`#${ctrlId} .seg-btn`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function segSelectByVal(ctrlId, val) {
  document.querySelectorAll(`#${ctrlId} .seg-btn`).forEach(b => {
    b.classList.toggle('active', b.dataset.val === val);
  });
}

function toggleDay(pill) {
  pill.classList.toggle('on');
}

/* ─── Hide FAB when not on Plans screen ─── */
function hideFab() {
  const fab = document.getElementById('plans-fab');
  if (fab) fab.style.display = 'none';
}

const _origGo = go;
// Wrap go() to hide FAB on screen change
function go(name, btn) {
  if (name !== 'plans') hideFab();
  _origGo(name, btn);
}

/* ═══════════════════════════════════════════════════
   PWA — SERVICE WORKER REGISTRATION
═══════════════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(r => console.log('[GlowGain SW] registered', r.scope))
      .catch(e => console.warn('[GlowGain SW] failed', e));
  });
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
(function init() {
  // ─── Track B: seed default plans on first load ───
  seedDefaultPlans();

  updateHeader();
  renderToday();
})();
</script>
